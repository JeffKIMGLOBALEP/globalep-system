// ===== PWA: Service Worker =====
let deferredInstallPrompt = null;
let pwaInstallDismissed = false;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

// ===== PWA: Install Prompt =====
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (!pwaInstallDismissed) {
    setTimeout(() => {
      const banner = document.getElementById('pwaInstallBanner');
      if (banner) banner.classList.remove('hidden');
    }, 2000);
  }
});

function installPWA() {
  if (!deferredInstallPrompt) {
    toast('Installation prompt not available. Try using browser menu: ⋮ → Install GLOBALEP', 'info');
    return;
  }
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then((result) => {
    if (result.outcome === 'accepted') {
      document.getElementById('pwaInstallBanner').classList.add('hidden');
      toast('✅ ' + (Store.lang==='zh'?'安装成功!':'Installed successfully!'), 'success');
    }
    deferredInstallPrompt = null;
  });
}

function dismissPWAInstall() {
  pwaInstallDismissed = true;
  document.getElementById('pwaInstallBanner').classList.add('hidden');
}

// Detect if already running as PWA (standalone mode)
if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
  document.body.classList.add('pwa-mode');
}

// ===== DATA BACKUP & EXPORT =====
function exportBackup() {
  const backupData = {
    version: '2.0',
    exportedAt: new Date().toISOString(),
    exportType: 'GLOBALEP-full-backup',
    data: {
      accounts: Store.accounts,
      permissionRequests: Store.permissionRequests,
      projects: Store.projects,
      products: Store.products,
      orders: Store.orders,
      customers: Store.customers,
      buyers: Store.buyers,
      influencers: Store.influencers,
      employees: Store.employees,
      documents: Store.documents,
      meetings: Store.meetings,
      risks: Store.risks,
      shipments: Store.shipments,
      warehouses: Store.warehouses,
      b2cPlatforms: Store.b2cPlatforms,
      wmsStock: Store.wmsStock,
      wmsLogs: Store.wmsLogs,
      crawledProducts: Store.crawledProducts,
      b2bOrders: Store.b2bOrders,
      b2bQuotes: Store.b2bQuotes,
      notifications: Store.notifications,
      history: Store.history,
      performanceData: performanceData,
      recruitmentData: recruitmentData,
    }
  };

  // Blob for localStorage data too
  const allData = JSON.stringify(backupData, null, 2);
  const blob = new Blob([allData], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.download = `GLOBALEP_backup_${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ ' + (Store.lang==='zh'?'备份已下载':'Backup downloaded') + ' → ' + a.download, 'success');
}

function triggerImportBackup() {
  const input = document.getElementById('importFileInput');
  if (input) input.click();
}

function importBackup(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.data || !backup.exportType) {
        toast((Store.lang==='zh'?'无效的备份文件格式':'Invalid backup file format'), 'error');
        return;
      }
      if (backup.version !== '2.0') {
        toast((Store.lang==='zh'?'备份文件版本不匹配，继续恢复...':'Version mismatch, proceeding...'), 'info');
      }
      // Restore data
      Object.keys(backup.data).forEach(key => {
        if (Store[key] !== undefined) {
          Store[key] = backup.data[key];
        }
      });
      // Restore org data
      if (backup.data.performanceData) performanceData = backup.data.performanceData;
      if (backup.data.recruitmentData) recruitmentData = backup.data.recruitmentData;
      saveToStorage();
      toast('✅ ' + (Store.lang==='zh'?'数据已恢复! 刷新页面生效':'Data restored! Refresh to apply'), 'success');
      setTimeout(() => { location.reload(); }, 1500);
    } catch (err) {
      toast((Store.lang==='zh'?'备份文件损坏，无法读取':'Backup file corrupted'), 'error');
      console.error('Import error:', err);
    }
  };
  reader.readAsText(file);
}

// ===== AUTO SAVE TO LOCAL STORAGE =====
function saveToStorage() {
  try {
    const storageData = JSON.stringify(Store);
    localStorage.setItem('globalep_store', storageData);
    localStorage.setItem('globalep_lastSave', new Date().toISOString());
    localStorage.setItem('globalep_perfData', JSON.stringify(performanceData));
    localStorage.setItem('globalep_recruitData', JSON.stringify(recruitmentData));
    // Also save user data separately for reliable session restore
    if (Store.user) {
      localStorage.setItem('globalep_user', JSON.stringify(Store.user));
    }
    return true;
  } catch (e) {
    console.warn('Auto-save failed (storage full?):', e.message);
    return false;
  }
}

function loadFromStorage() {
  try {
    // Priority 1: Restore user from dedicated key (most reliable)
    const userSaved = localStorage.getItem('globalep_user');
    if (userSaved) {
      const u = JSON.parse(userSaved);
      if (u && u.username) Store.user = u;
    }
    // Priority 2: Merge full store (but don't overwrite user from step 1)
    const saved = localStorage.getItem('globalep_store');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.keys(parsed).forEach(key => {
        if (Store[key] !== undefined && key !== 'user') {
          Store[key] = parsed[key];
        }
      });
      const lastSave = localStorage.getItem('globalep_lastSave');
      if (lastSave) Store.lastBackupTime = lastSave;
    }
    // Load org data
    const perfSaved = localStorage.getItem('globalep_perfData');
    if (perfSaved) {
      try {
        const parsed = JSON.parse(perfSaved);
        performanceData = Array.isArray(parsed) ? parsed : [];
      } catch(e) { performanceData = []; }
      if (performanceData.length === 0) initPerformanceData();
    } else {
      initPerformanceData();
    }
    const recSaved = localStorage.getItem('globalep_recruitData');
    if (recSaved) {
      try {
        const parsed = JSON.parse(recSaved);
        recruitmentData = Array.isArray(parsed) ? parsed : [];
      } catch(e) { recruitmentData = []; }
      if (recruitmentData.length === 0) computeRecruitment(defaultWorkload);
    } else {
      computeRecruitment(defaultWorkload);
    }
  } catch (e) {
    console.error('Failed to load from storage:', e.message);
  }
}

// Restore session from localStorage (MUST run before restoreApp)
try {
  const saved = localStorage.getItem('globalep_user');
  if (saved) {
    const u = JSON.parse(saved);
    if (u && u.username) Store.user = u;
  }
} catch(e) {}

// Load saved data on startup
loadFromStorage();

// Build sidebar & navigate to dashboard if session found (login visibility handled by inline script above)
(function restoreApp() {
  try {
    if (!Store.user || !Store.user.username) return;
    // SAFETY NET: Remove any login container that may have been injected
    var lc = document.getElementById('loginContainer');
    if (lc && lc.parentNode) lc.parentNode.removeChild(lc);
    // Ensure app is visible
    var ac = document.getElementById('appContainer');
    if (ac) ac.style.display = 'flex';
    buildSidebar();
    showPage('dashboard');
  } catch (e) {
    console.error('Session restore error:', e.message);
  }
})();

// Auto-save: save on every 30 seconds + on window unload
let autoSaveEnabled = localStorage.getItem('globalep_autoSave') !== 'off';
setInterval(() => {
  if (autoSaveEnabled && Store.user) {
    saveToStorage();
  }
}, 30000); // every 30 seconds

window.addEventListener('beforeunload', () => {
  if (autoSaveEnabled && Store.user) {
    saveToStorage();
  }
});

// Watch for changes and auto-save (debounced)
let saveTimeout = null;
const autoSaveObserver = new MutationObserver(() => {
  if (autoSaveEnabled && Store.user) {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => saveToStorage(), 2000);
  }
});
// Start observing after login
document.addEventListener('DOMContentLoaded', () => {
  if (Store.user) {
    autoSaveObserver.observe(document.getElementById('appContainer'), {
      childList: true, subtree: true, characterData: true
    });
  }
});
</script>
