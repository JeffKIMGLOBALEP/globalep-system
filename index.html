<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3b82f6">
<meta name="description" content="GLOBALEP - Global E-Commerce Integrated Management System">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230a0e17'/><text x='32' y='44' font-size='42' font-weight='bold' fill='%233b82f6' text-anchor='middle' font-family='sans-serif'>G</text></svg>">
<title>GLOBALEP - Global E-Commerce Management System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: rgba(17, 25, 40, 0.75);
  --bg-card-solid: #111927;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --accent-dark: #1d4ed8;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: rgba(59, 130, 246, 0.15);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --glow: 0 0 20px rgba(59, 130, 246, 0.3);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'Noto Sans KR', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

/* ===== LOGIN ===== */
.login-container {
  position: fixed; inset: 0; z-index: 9999;
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0e17 70%);
  display: none; align-items: center; justify-content: center;
  flex-direction: column;
}
.login-container.hidden { display: none !important; visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; }

.login-bg { position: absolute; inset: 0; overflow: hidden; }
.login-bg .particle {
  position: absolute; width: 2px; height: 2px;
  background: var(--accent); border-radius: 50%;
  animation: floatUp 6s infinite ease-in;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.login-card {
  position: relative; z-index: 1;
  background: rgba(17, 25, 40, 0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  width: 420px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5), var(--glow);
}

.login-logo {
  text-align: center; margin-bottom: 32px;
}
.login-logo h1 {
  font-size: 32px; font-weight: 800;
  background: linear-gradient(135deg, #60a5fa, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
.login-logo p { color: var(--text-secondary); font-size: 13px; margin-top: 6px; }

.login-lang { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; }
.login-lang button {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-secondary); padding: 6px 16px;
  border-radius: 20px; cursor: pointer; font-size: 12px;
  transition: var(--transition);
}
.login-lang button.active { background: var(--accent); color: white; border-color: var(--accent); }

.input-group {
  margin-bottom: 18px; position: relative;
}
.input-group i {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px;
}
.input-group input, .input-group select {
  width: 100%; padding: 12px 14px 12px 40px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary); font-size: 14px;
  outline: none; transition: var(--transition);
}
.input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

.btn-primary {
  width: 100%; padding: 12px; background: linear-gradient(135deg, #2563eb, #3b82f6);
  border: none; border-radius: var(--radius-sm); color: white;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: var(--transition); margin-top: 8px;
}
.btn-primary:hover { box-shadow: var(--glow); transform: translateY(-1px); }

.login-toggle {
  text-align: center; margin-top: 16px; font-size: 12px; color: var(--text-muted);
}
.login-toggle a {
  color: var(--accent-light); cursor: pointer; text-decoration: none; font-weight: 600;
  transition: var(--transition);
}
.login-toggle a:hover { color: var(--accent); }

/* Phone input with country code */
.phone-input-wrap {
  display: flex; gap: 0;
}
.phone-input-wrap .country-code {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-right: none;
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  color: var(--text-primary); font-size: 13px;
  white-space: nowrap; min-width: 85px;
}
.phone-input-wrap .country-code img { width: 18px; height: 12px; border-radius: 2px; }
.phone-input-wrap input {
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
  padding-left: 14px !important;
}

/* SMS verification */
.sms-row {
  display: flex; gap: 10px;
}
.sms-row input { flex: 1; }
.sms-row .btn-sms {
  padding: 12px 16px; background: var(--accent);
  color: white; border: none; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; cursor: pointer;
  white-space: nowrap; transition: var(--transition);
}
.sms-row .btn-sms:hover { background: var(--accent-dark); }
.sms-row .btn-sms:disabled { background: var(--text-muted); cursor: not-allowed; }
.sms-row .btn-sms.counting { background: var(--text-muted); }

/* Terms checkbox */
.terms-check {
  display: flex; align-items: flex-start; gap: 8px;
  margin: 12px 0 4px; font-size: 11px; color: var(--text-muted);
}
.terms-check input[type="checkbox"] {
  margin-top: 2px; accent-color: var(--accent);
}
.terms-check a { color: var(--accent-light); text-decoration: none; }

/* PWA Install Banner */
.pwa-install-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9998;
  background: linear-gradient(135deg, rgba(17,25,40,0.97), rgba(30,58,138,0.97));
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 14px;
  animation: slideDown 0.4s cubic-bezier(0.4,0,0.2,1);
}
.pwa-install-banner.hidden { display: none; }
@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
.pwa-install-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.pwa-install-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.pwa-install-text strong { font-size: 14px; color: var(--text-primary); }
.pwa-install-text span { font-size: 11px; color: var(--text-secondary); }
.pwa-install-btn {
  padding: 8px 20px; background: var(--accent); color: white;
  border: none; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  transition: var(--transition);
}
.pwa-install-btn:hover { background: var(--accent-dark); }
.pwa-install-close {
  background: transparent; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 16px; padding: 4px;
}
.pwa-install-close:hover { color: var(--text-primary); }

/* Permission request styles */
.perm-request-badge {
  display: inline-block; background: var(--warning); color: #000;
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; margin-left: 6px;
}
.perm-status-pending { color: var(--warning); font-size: 11px; }
.perm-status-approved { color: var(--success); font-size: 11px; }
.perm-status-rejected { color: var(--danger); font-size: 11px; }

.perm-actions { display: flex; gap: 6px; }
.perm-actions .btn-approve {
  padding: 4px 12px; background: var(--success); color: white;
  border: none; border-radius: 4px; font-size: 11px; cursor: pointer;
  transition: var(--transition);
}
.perm-actions .btn-approve:hover { opacity: 0.85; }
.perm-actions .btn-reject {
  padding: 4px 12px; background: var(--danger); color: white;
  border: none; border-radius: 4px; font-size: 11px; cursor: pointer;
  transition: var(--transition);
}
.perm-actions .btn-reject:hover { opacity: 0.85; }

/* Section tabs for permissions */
.perm-section { margin-bottom: 20px; }
.perm-section h3 {
  font-size: 14px; color: var(--accent-light); margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}

/* Register success modal */
.register-success {
  text-align: center; padding: 20px;
}
.register-success i {
  font-size: 48px; color: var(--success); margin-bottom: 16px;
}
.register-success h3 { margin-bottom: 8px; }
.register-success p { color: var(--text-secondary); font-size: 13px; margin-bottom: 4px; }

/* Login / Register form switching */
.login-form, .register-form { display: none; }
.login-form.active, .register-form.active { display: block; }

/* ===== MAIN APP LAYOUT ===== */
.app-container { display: none; height: 100vh; }
.app-container.active { display: flex; }

.sidebar {
  width: 260px; min-width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: var(--transition);
  overflow-y: auto; overflow-x: hidden;
}
.sidebar.collapsed { width: 60px; min-width: 60px; }

.sidebar-logo {
  padding: 20px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo span {
  font-size: 18px; font-weight: 700; white-space: nowrap;
  background: linear-gradient(135deg, #60a5fa, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.sidebar-nav { flex: 1; padding: 12px 8px; }
.nav-section { margin-bottom: 6px; }
.nav-section-title {
  padding: 8px 12px; font-size: 10px; text-transform: uppercase;
  color: var(--text-muted); letter-spacing: 1.5px;
}
.sidebar.collapsed .nav-section-title { display: none; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition);
  color: var(--text-secondary); font-size: 13px;
  white-space: nowrap; margin-bottom: 2px;
  position: relative;
}
.nav-item:hover { background: rgba(59,130,246,0.1); color: var(--text-primary); }
.nav-item.active { background: rgba(59,130,246,0.2); color: var(--accent-light); }
.nav-item i { width: 18px; text-align: center; font-size: 14px; }

.sidebar.collapsed .nav-item span { display: none; }
.sidebar.collapsed .nav-item { justify-content: center; padding: 10px; }

.main-content {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

.topbar {
  height: 56px; min-height: 56px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px;
  gap: 16px; z-index: 10;
}
.topbar-toggle {
  background: none; border: none; color: var(--text-secondary);
  cursor: pointer; font-size: 18px; padding: 4px;
}
.topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
.topbar-actions { display: flex; gap: 12px; align-items: center; }
.topbar-btn {
  background: transparent; border: none; color: var(--text-secondary);
  cursor: pointer; font-size: 16px; padding: 6px 10px;
  border-radius: var(--radius-sm); transition: var(--transition);
  position: relative;
}
.topbar-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.topbar-btn .badge {
  position: absolute; top: 2px; right: 2px;
  width: 8px; height: 8px; background: var(--danger);
  border-radius: 50%;
}
.topbar-lang { display: flex; gap: 4px; }
.topbar-lang button {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-secondary); padding: 3px 10px;
  border-radius: 12px; cursor: pointer; font-size: 11px;
  transition: var(--transition);
}
.topbar-lang button.active { background: var(--accent); color: white; border-color: var(--accent); }

.content-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 24px; position: relative;
}
.content-area::-webkit-scrollbar { width: 6px; }
.content-area::-webkit-scrollbar-track { background: transparent; }
.content-area::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 3px; }

.page { display: none; animation: fadeSlideIn 0.4s ease; }
.page.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== DASHBOARD ===== */
.dashboard-globe-container {
  position: relative; width: 100%; height: calc(100vh - 180px);
  border-radius: var(--radius); overflow: hidden;
  background: transparent;
}

#globeCanvas { width: 100%; height: 100%; display: block; }

.globe-overlay {
  position: absolute; inset: 0; pointer-events: none;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 16px;
}

.data-panel {
  position: absolute; pointer-events: auto;
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  min-width: 220px; max-width: 280px;
  font-size: 12px;
  animation: panelFloat 4s ease-in-out infinite;
}
@keyframes panelFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.data-panel.top-left { top: 12px; left: 12px; animation-delay: 0s; }
.data-panel.top-right { top: 12px; right: 12px; animation-delay: 0.5s; }
.data-panel.bottom-left { bottom: 12px; left: 12px; animation-delay: 1s; }
.data-panel.bottom-right { bottom: 12px; right: 12px; animation-delay: 1.5s; }
.data-panel.bottom-center { bottom: 12px; left: 50%; transform: translateX(-50%); }
@keyframes panelFloatCenter {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}

.panel-title {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.panel-value {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.panel-sub { color: var(--text-secondary); font-size: 11px; }
.panel-change { color: var(--success); font-size: 11px; }
.panel-change.down { color: var(--danger); }

/* AI Search Section */
.ai-search-section {
  margin-top: 16px; padding: 20px;
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius);
}
.ai-search-bar {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.ai-search-bar input {
  flex: 1; padding: 10px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary); font-size: 14px; outline: none;
}
.ai-search-bar select {
  padding: 10px 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary); font-size: 14px;
}
.top10-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  margin-top: 16px;
}
@media (max-width: 1400px) { .top10-grid { grid-template-columns: repeat(2, 1fr); } }

.top10-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
.top10-card h4 { font-size: 12px; color: var(--accent-light); margin-bottom: 8px; }
.top10-item {
  display: flex; justify-content: space-between; padding: 4px 0;
  font-size: 11px; color: var(--text-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.top10-item .rank { color: var(--accent); font-weight: 700; width: 20px; }
.top10-item .name { flex: 1; }
.top10-item .name a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
.top10-item .name a:hover { color: var(--accent-light); text-decoration: underline; }
.top10-item .val { color: var(--text-primary); }

/* Platform News Section */
.platform-news-grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
  margin-top: 12px;
}
@media (max-width: 1600px) { .platform-news-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 1200px) { .platform-news-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .platform-news-grid { grid-template-columns: repeat(2, 1fr); } }
.platform-news-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px;
  transition: border-color 0.2s;
}
.platform-news-card:hover { border-color: var(--accent); }
.platform-news-card h5 {
  font-size: 11px; color: var(--accent-light); margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.platform-news-card h5 img { width: 16px; height: 16px; border-radius: 3px; }
.platform-news-card a {
  font-size: 10px; color: var(--text-secondary); text-decoration: none;
  display: block; line-height: 1.4; margin-bottom: 3px;
  transition: color 0.2s;
}
.platform-news-card a:hover { color: var(--accent-light); }
.platform-news-card .news-time { font-size: 9px; color: var(--text-muted); }

/* News Ticker */
.news-ticker {
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 16px; margin-top: 12px; overflow: hidden;
  display: flex; gap: 12px; align-items: center;
}
.news-ticker i { color: var(--warning); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.news-ticker-content { flex:1; overflow:hidden; position:relative; height:20px; }
.news-ticker-text {
  position: absolute; white-space: nowrap;
  animation: tickerScroll 20s linear infinite;
}
@keyframes tickerScroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

/* ===== MODULE PAGES GENERAL ===== */
.module-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.module-header h2 { font-size: 20px; font-weight: 700; }
.module-actions { display: flex; gap: 8px; }

.btn {
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-size: 13px; cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-primary);
}
.btn:hover { background: rgba(59,130,246,0.1); border-color: var(--accent); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
.btn-accent:hover { background: var(--accent-dark); }
.btn-success { border-color: var(--success); color: var(--success); }
.btn-success:hover { background: rgba(16,185,129,0.1); }
.btn-warning { border-color: var(--warning); color: var(--warning); }
.btn-warning:hover { background: rgba(245,158,11,0.1); }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }

/* Data Table */
.data-table-wrap {
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden;
}
.table-toolbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.table-search input {
  padding: 8px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-primary); font-size: 13px; width: 260px; outline: none;
}
table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
th {
  text-align: left; padding: 12px 16px;
  background: rgba(59,130,246,0.08);
  color: var(--accent-light); font-weight: 600;
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-secondary);
}
tr:hover td { background: rgba(59,130,246,0.05); color: var(--text-primary); }
.badge {
  padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
}
.badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
.badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
.badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
.badge-info { background: rgba(59,130,246,0.15); color: var(--accent-light); }

/* Stats Row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; display: flex; justify-content: space-between; align-items: flex-start;
}
.stat-card .stat-info h4 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.stat-card .stat-info .stat-value { font-size: 26px; font-weight: 700; margin: 4px 0; color: var(--text-primary); }
.stat-card .stat-info .stat-change { font-size: 11px; color: var(--success); }
.stat-card .stat-icon { font-size: 28px; color: var(--accent); opacity: 0.6; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-card-solid); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px; width: 560px; max-height: 80vh; overflow-y: auto;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  animation: fadeSlideIn 0.3s ease;
}
.modal h3 { margin-bottom: 20px; font-size: 18px; }
.modal .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.modal .form-row.full { grid-template-columns: 1fr; }
.modal label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.modal input, .modal select, .modal textarea {
  width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text-primary); font-size: 13px; outline: none;
}
.modal textarea { resize: vertical; min-height: 80px; font-family: inherit; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* Toast */
.toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--bg-card-solid); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 20px;
  font-size: 13px; animation: slideInRight 0.3s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}
@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab {
  padding: 10px 20px; cursor: pointer; font-size: 13px;
  color: var(--text-secondary); border-bottom: 2px solid transparent;
  transition: var(--transition);
}
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }

/* Notifications dropdown */
.notif-dropdown {
  position: absolute; top: 100%; right: 0; width: 360px;
  background: var(--bg-card-solid); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  max-height: 400px; overflow-y: auto; display: none;
}
.notif-dropdown.active { display: block; }
.notif-item {
  padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 13px; cursor: pointer; transition: var(--transition);
}
.notif-item:hover { background: rgba(59,130,246,0.05); }
.notif-item .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* File upload zone */
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 40px; text-align: center; cursor: pointer;
  transition: var(--transition); margin: 16px 0;
}
.upload-zone:hover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
.upload-zone i { font-size: 36px; color: var(--text-muted); margin-bottom: 12px; }
.upload-zone p { color: var(--text-secondary); font-size: 13px; }

/* Chart containers */
.chart-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 16px; }
.chart-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.chart-card h4 { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.chart-card canvas { max-height: 300px; }

/* Platform selector */
.platform-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.platform-tag {
  padding: 4px 12px; border-radius: 14px; font-size: 11px;
  cursor: pointer; border: 1px solid var(--border);
  color: var(--text-secondary); transition: var(--transition);
  background: transparent;
}
.platform-tag:hover { border-color: var(--accent); color: var(--accent-light); }
.platform-tag.active { background: var(--accent); color: white; border-color: var(--accent); }

/* User menu dropdown */
.user-menu {
  position: relative;
}
.user-dropdown {
  position: absolute; top: 100%; right: 0; width: 200px;
  background: var(--bg-card-solid); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  display: none; z-index: 100;
}
.user-dropdown.active { display: block; }
.user-dropdown-item {
  padding: 10px 16px; font-size: 13px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  display: flex; align-items: center; gap: 8px;
  color: var(--text-secondary); transition: var(--transition);
}
.user-dropdown-item:hover { background: rgba(59,130,246,0.05); color: var(--text-primary); }

/* Kanban */
.kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.kanban-col {
  background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px; min-height: 300px;
}
.kanban-col h4 { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; }
.kanban-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px;
  font-size: 12px; cursor: pointer; transition: var(--transition);
}
.kanban-card:hover { border-color: var(--accent); }
.kanban-card .kc-title { font-weight: 600; margin-bottom: 4px; }
.kanban-card .kc-meta { color: var(--text-muted); font-size: 10px; }

/* Progress bars */
.progress-bar {
  height: 6px; background: rgba(255,255,255,0.08);
  border-radius: 3px; overflow: hidden; margin-top: 6px;
}
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.progress-fill.blue { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.progress-fill.green { background: linear-gradient(90deg, #10b981, #34d399); }
.progress-fill.yellow { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.progress-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }

/* ===== ORG CHART STYLES ===== */
.org-page { padding: 20px; }
.org-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); flex-wrap: wrap; }
.org-tab { padding: 10px 20px; cursor: pointer; border: none; background: none; color: var(--text-secondary); font-size: 14px; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.org-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.org-tab .tab-badge { background: var(--danger); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; margin-left: 4px; }
.org-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 900px) { .org-cols { grid-template-columns: 1fr; } }
.org-col { background: var(--bg-card); border-radius: 12px; padding: 20px; }
.org-col-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
.org-col-header .flag { font-size: 28px; }
.org-col-header h3 { font-size: 16px; margin: 0; }
.org-col-header .ceo-name { font-size: 12px; color: var(--text-secondary); }
.org-tree { }
.org-dept { margin-bottom: 4px; border-left: 3px solid var(--accent); padding: 8px 12px; margin-left: 8px; border-radius: 4px; background: var(--bg-hover); transition: all 0.15s; }
.org-dept:hover { background: var(--border); }
.org-dept.leaf { border-left-color: var(--text-secondary); }
.org-dept-header { display: flex; justify-content: space-between; align-items: center; }
.org-dept-name { font-weight: 600; font-size: 13px; }
.org-dept-lead { font-size: 12px; color: var(--accent); font-weight: 600; }
.org-dept-members { font-size: 11px; color: var(--text-secondary); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px; }
.org-dept-member-tag { background: var(--bg-card); border: 1px solid var(--border); padding: 1px 8px; border-radius: 10px; font-size: 11px; }
.org-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-top: 12px; }
.org-stat { text-align: center; padding: 10px; background: var(--bg-hover); border-radius: 8px; }
.org-stat .num { font-size: 24px; font-weight: 700; }
.org-stat .lbl { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Business Lines */
.biz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.biz-card { background: var(--bg-card); border-radius: 12px; padding: 16px; border: 1px solid var(--border); transition: all 0.2s; }
.biz-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.biz-card-idx { display: inline-block; width: 28px; height: 28px; line-height: 28px; text-align: center; border-radius: 50%; background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.biz-card h4 { font-size: 14px; margin: 0 0 8px 0; }
.biz-card p { font-size: 12px; color: var(--text-secondary); margin: 0 0 8px 0; line-height: 1.5; }
.biz-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.biz-tag { background: var(--bg-hover); color: var(--text-secondary); padding: 2px 8px; border-radius: 4px; font-size: 10px; border: 1px solid var(--border); }
.biz-tag.accent { background: rgba(59,130,246,0.1); color: var(--accent); border-color: rgba(59,130,246,0.2); }

/* Team-Biz Mapping */
.map-header { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.map-filter { padding: 6px 14px; border-radius: 18px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; transition: all 0.15s; background: var(--bg-card); }
.map-filter.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.map-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.map-table th { background: var(--bg-hover); padding: 8px 10px; text-align: left; font-weight: 600; font-size: 11px; color: var(--text-secondary); }
.map-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.map-table tr:hover td { background: var(--bg-hover); }
.map-table .company-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
.map-table .company-tag.kr { background: rgba(205,42,49,0.12); color: #cd2a31; }
.map-table .company-tag.cn { background: rgba(222,41,16,0.12); color: #de2910; }
.map-biz-link { display: inline-block; background: rgba(59,130,246,0.08); color: var(--accent); padding: 1px 6px; border-radius: 3px; margin: 1px 2px; font-size: 10px; }

/* Performance */
.perf-toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.perf-toolbar select, .perf-toolbar input, .perf-toolbar button { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; font-family: inherit; background: var(--bg-card); color: var(--text); }
.perf-toolbar button { background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600; padding: 8px 18px; }
.perf-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.perf-card { background: var(--bg-card); border-radius: 10px; padding: 14px; border: 1px solid var(--border); }
.perf-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.perf-card-header h4 { margin: 0; font-size: 13px; }
.perf-grade { padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; }
.perf-grade.s { background: #10b981; color: #fff; }
.perf-grade.a { background: #3b82f6; color: #fff; }
.perf-grade.b { background: #f59e0b; color: #fff; }
.perf-grade.c { background: #ef4444; color: #fff; }
.perf-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
.perf-row .lbl { color: var(--text-secondary); }
.perf-row .val { font-weight: 600; }
.perf-progress { height: 6px; background: var(--bg-hover); border-radius: 3px; margin: 8px 0; }
.perf-progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

/* Recruitment */
.recruit-alert { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-radius: 10px; margin-bottom: 12px; font-size: 13px; }
.recruit-alert.urgent { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
.recruit-alert.normal { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; }
.recruit-alert .alert-icon { font-size: 20px; }
.recruit-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
.recruit-table th { background: var(--bg-hover); padding: 8px 10px; text-align: left; font-weight: 600; font-size: 11px; color: var(--text-secondary); }
.recruit-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.recruit-table tr:hover td { background: var(--bg-hover); }
.recruit-priority { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.recruit-priority.high { background: #ef4444; }
.recruit-priority.medium { background: #f59e0b; }
.recruit-priority.low { background: #10b981; }
.recruit-action { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
.recruit-action.need { background: #ef4444; color: #fff; }
.recruit-action.watch { background: #f59e0b; color: #000; }
.recruit-action.ok { background: #10b981; color: #fff; }

/* Modal: Edit Performance */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-box { background: var(--bg-card); border-radius: 14px; padding: 24px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
.modal-box h3 { margin-top: 0; }
.modal-box label { display: block; font-size: 12px; font-weight: 600; margin: 12px 0 4px; color: var(--text-secondary); }
.modal-box input, .modal-box select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; background: var(--bg-hover); color: var(--text); margin-bottom: 4px; box-sizing: border-box; }
.modal-box textarea { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; background: var(--bg-hover); color: var(--text); min-height: 60px; resize: vertical; box-sizing: border-box; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-actions button { padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.modal-actions .btn-primary { background: var(--accent); color: #fff; }
.modal-actions .btn-cancel { background: var(--bg-hover); color: var(--text); }

<script>
// IMMEDIATE session check — clone login template only if no user
(function() {
  var userSaved;
  try { userSaved = localStorage.getItem('globalep_user'); } catch(e) {}
  if (userSaved) {
    try {
      var u = JSON.parse(userSaved);
      if (u && u.username) {
        // Logged in — show app only, never inject login
        var ac = document.getElementById('appContainer');
        if (ac) ac.style.display = 'flex';
        var un = document.getElementById('currentUserName');
        if (un) un.textContent = u.name || u.username;
        return;
      }
    } catch(e) {}
  }
  // No valid user — inject login into DOM and show it
  var tpl = document.getElementById('loginTemplate');
  if (tpl) {
    var clone = tpl.content.cloneNode(true);
    document.body.insertBefore(clone, document.getElementById('appContainer'));
    // Force show with inline style to override CSS !important
    var lc = document.getElementById('loginContainer');
    if (lc) lc.style.display = 'flex';
  }
})();
</script>

function initPerformanceData() {
  if (performanceData.length > 0) return;
  const allPeople = getAllPeople();
  allPeople.forEach(p => {
    performanceData.push({
      id: 'perf_' + p.deptId + '_' + p.name.replace(/\s/g,'_'),
      deptId: p.deptId,
      company: p.company,
      name: p.name,
      role: p.role,
      deptName: p.deptName,
      kpi: Math.floor(Math.random() * 31) + 70, // 70-100
      grade: 'b',
      achievements: '',
      updatedAt: ''
    });
  });
}
function getAllPeople() {
  const people = [];
  ['korea','china'].forEach(company => {
    orgData[company].depts.forEach(dept => {
      if (dept.lead && pName(dept.lead)) people.push({ deptId:dept.id, company, name:pName(dept.lead), role:'lead', deptName:dept.name, resp:pResp(dept.lead) });
      dept.members.forEach(m => people.push({ deptId:dept.id, company, name:pName(m), role:'member', deptName:dept.name, resp:pResp(m) }));
    });
  });
  return people;
}
function getTotalHeadcount() { return getAllPeople().length; }
function getDeptCount() { return orgData.korea.depts.length + orgData.china.depts.length; }
function getBizCount() { return businessLines.length; }
function getPersonByName(name) { return getAllPeople().find(p => p.name === name); }
function getDeptById(deptId) {
  for (const c of ['korea','china']) {
    const d = orgData[c].depts.find(x => x.id === deptId);
    if (d) return { ...d, company: c, companyName: c === 'korea' ? '韩国公司' : '中国公司' };
  }
  return null;
}
function getBizTeamNames(deptIds) {
  return deptIds.map(id => {
    const d = getDeptById(id);
    return d ? d.name + ' (' + pName(d.lead) + ')' : id;
  });
}

// Compute recruitment needs based on workload vs headcount
function computeRecruitment(workloadData) {
  recruitmentData = [];
  for (const c of ['korea','china']) {
    orgData[c].depts.forEach(dept => {
      const hc = 1 + dept.members.length; // lead + members
      const wl = workloadData?.[dept.id] || 1;
      const ratio = wl / hc;
      let status, needHire;
      if (ratio > 2.5) { status = 'status_urgent'; needHire = Math.ceil((wl - hc * 2) / 2); }
      else if (ratio > 1.5) { status = 'status_watch'; needHire = ratio > 2 ? 1 : 0; }
      else { status = 'status_ok'; needHire = 0; }
      recruitmentData.push({
        deptId: dept.id, deptName: dept.name, company: c,
        companyName: c === 'korea' ? '韩国公司' : '中国公司',
        headcount: hc, workload: wl, ratio: ratio.toFixed(1),
        status, needHire
      });
    });
  }
  return recruitmentData;
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const userPerms = Store.user?.permissions;
  let html = '';
  navStructure.forEach(section => {
    // Filter items based on permissions
    let items = section.items;
    if (userPerms && Store.user.accountId) {
      items = section.items.filter(item => {
        const permKey = item.id === 'dashboard' ? 'dashboard' :
          ['project_finance','project_progress','project_kpi','project_report'].includes(item.id) ? 'project_mgmt' :
          ['erp_products','erp_orders','erp_inventory'].includes(item.id) ? 'erp' :
          ['customer_list','global_buyers','influencers'].includes(item.id) ? 'customer' :
          ['hr_recruitment','hr_employees','hr_performance'].includes(item.id) ? 'hr' :
          item.id;
        return userPerms[permKey] === true;
      });
    }
    if (items.length === 0) return;
    html += `<div class="nav-section"><div class="nav-section-title">${t(section.section)}</div>`;
    items.forEach(item => {
      html += `<div class="nav-item" onclick="showPage('${item.id}')" data-page="${item.id}">
        <i class="fas ${item.icon}"></i> <span>${t(item.key)}</span>
      </div>`;
    });
    html += '</div>';
  });
  nav.innerHTML = html;
}

// ===== 3D GLOBE =====
let globeScene, globeCamera, globeRenderer, globeEarth, globeMarkers = [], globeParticles = [];
let isDragging = false, prevMouseX = 0, prevMouseY = 0, globeRotation = { x: 0.3, y: 0 };

function initDashboard() {
  setTimeout(() => initGlobe(), 200);
}

function initGlobe() {
  const container = document.getElementById('globeContainer');
  const canvas = document.getElementById('globeCanvas');
  if (!container || !canvas || globeScene) return;
  
  const w = container.clientWidth;
  const h = container.clientHeight;
  
  globeScene = new THREE.Scene();
  globeCamera = new THREE.PerspectiveCamera(45, w/h, 0.1, 1000);
  globeCamera.position.z = 5;
  
  globeRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  globeRenderer.setSize(w, h);
  globeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  
  // Earth sphere
  const geometry = new THREE.SphereGeometry(1.5, 64, 64);
  const material = new THREE.MeshPhongMaterial({
    color: 0xcccccc,
    emissive: 0x111111,
    specular: 0x333333,
    shininess: 15,
    wireframe: false,
    transparent: true,
    opacity: 0.9,
  });
  globeEarth = new THREE.Mesh(geometry, material);
  globeScene.add(globeEarth);
  
  // Wireframe overlay
  const wireGeo = new THREE.SphereGeometry(1.52, 48, 48);
  const wireMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.08 });
  const wireframe = new THREE.Mesh(wireGeo, wireMat);
  globeScene.add(wireframe);
  
  // Lighting
  const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
  globeScene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0x6088ff, 0.8);
  dirLight.position.set(5, 3, 5);
  globeScene.add(dirLight);
  
  // Platform markers
  Store.platforms.forEach(plat => {
    const phi = (90 - plat.lat) * Math.PI / 180;
    const theta = (plat.lng + 180) * Math.PI / 180;
    const r = 1.55;
    
    const markerGeo = new THREE.SphereGeometry(0.03, 8, 8);
    const markerMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa });
    const marker = new THREE.Mesh(markerGeo, markerMat);
    marker.position.set(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    );
    marker.userData = plat;
    globeEarth.add(marker);
    globeMarkers.push(marker);
    
    // Glow ring
    const ringGeo = new THREE.RingGeometry(0.04, 0.06, 16);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(marker.position);
    ring.lookAt(new THREE.Vector3(0,0,0));
    globeEarth.add(ring);
  });
  
  // Particles
  for (let i = 0; i < 300; i++) {
    const pGeo = new THREE.SphereGeometry(0.008, 4, 4);
    const pMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: Math.random() * 0.8 + 0.2 });
    const particle = new THREE.Mesh(pGeo, pMat);
    const phi = Math.random() * Math.PI;
    const theta = Math.random() * Math.PI * 2;
    const pr = 1.8 + Math.random() * 0.8;
    particle.position.set(
      pr * Math.sin(phi) * Math.cos(theta),
      pr * Math.cos(phi),
      pr * Math.sin(phi) * Math.sin(theta)
    );
    particle.userData = { speed: Math.random() * 0.005 + 0.002, phi, theta, pr, basePhi: phi, baseTheta: theta };
    globeScene.add(particle);
    globeParticles.push(particle);
  }
  
  // Mouse interaction
  container.addEventListener('mousedown', (e) => { isDragging = true; prevMouseX = e.clientX; prevMouseY = e.clientY; });
  window.addEventListener('mouseup', () => { isDragging = false; });
  window.addEventListener('mousemove', (e) => {
    if (!isDragging || !globeEarth) return;
    const dx = e.clientX - prevMouseX;
    const dy = e.clientY - prevMouseY;
    globeEarth.rotation.y += dx * 0.005;
    globeEarth.rotation.x += dy * 0.005;
    globeEarth.rotation.x = Math.max(-1, Math.min(1, globeEarth.rotation.x));
    prevMouseX = e.clientX; prevMouseY = e.clientY;
  });
  
  // Touch support
  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      prevMouseX = e.touches[0].clientX;
      prevMouseY = e.touches[0].clientY;
    }
  });
  container.addEventListener('touchmove', (e) => {
    if (!isDragging || !globeEarth) return;
    const dx = e.touches[0].clientX - prevMouseX;
    const dy = e.touches[0].clientY - prevMouseY;
    globeEarth.rotation.y += dx * 0.005;
    globeEarth.rotation.x += dy * 0.005;
    prevMouseX = e.touches[0].clientX; prevMouseY = e.touches[0].clientY;
  });
  container.addEventListener('touchend', () => { isDragging = false; });
  
  // Resize
  window.addEventListener('resize', () => {
    if (!globeRenderer) return;
    const nw = container.clientWidth;
    const nh = container.clientHeight;
    globeCamera.aspect = nw / nh;
    globeCamera.updateProjectionMatrix();
    globeRenderer.setSize(nw, nh);
  });
  
  animateGlobe();
}

function animateGlobe() {
  requestAnimationFrame(animateGlobe);
  if (!globeEarth) return;
  
  if (!isDragging) {
    globeEarth.rotation.y += 0.0015;
  }
  
  // Animate particles
  globeParticles.forEach(p => {
    p.userData.theta += p.userData.speed;
    const phi = p.userData.basePhi;
    const theta = p.userData.theta;
    const pr = p.userData.pr;
    p.position.set(
      pr * Math.sin(phi) * Math.cos(theta),
      pr * Math.cos(phi) + Math.sin(Date.now() * 0.001 + phi) * 0.1,
      pr * Math.sin(phi) * Math.sin(theta)
    );
    p.material.opacity = 0.2 + Math.sin(Date.now() * 0.003 + pr) * 0.3 + 0.3;
  });
  
  globeRenderer.render(globeScene, globeCamera);
}

function highlightPlatform(platId) {
  globeMarkers.forEach(m => {
    if (m.userData.id === platId) {
      m.material.color.set(0xffffff);
      m.scale.set(2, 2, 2);
      setTimeout(() => { m.material.color.set(0x60a5fa); m.scale.set(1,1,1); }, 2000);
    }
  });
  toast(`Highlighted: ${Store.platforms.find(p=>p.id===platId)?.name || platId}`);
}

// ===== B2C ERP (Platform Integration + Auto Listing) =====
function renderB2CERP() {
  const platforms = Store.b2cPlatforms || [];

  const pendingSync = platforms.filter(p => p.status === 'pending').length;

  return moduleHeader('b2c_erp') + `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-info"><h4>${t('connected_platforms')}</h4><div class="stat-value">${connected}/${platforms.length}</div></div><div class="stat-icon"><i class="fas fa-plug"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>${t('products_crawled')}</h4><div class="stat-value">${totalSynced}</div></div><div class="stat-icon"><i class="fas fa-sync"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>${t('status_pending')}</h4><div class="stat-value" style="color:var(--warning)">${pendingSync}</div></div><div class="stat-icon"><i class="fas fa-clock"></i></div></div>
      <div class="stat-card"><div class="stat-info"><h4>${t('auto_publish')}</h4><div class="stat-value" style="color:var(--success)">ON</div></div><div class="stat-icon"><i class="fas fa-rocket"></i></div></div>
    </div>

    <div style="margin-top:16px;">
      <h3 style="margin:0 0 12px 0;font-size:16px;">🔌 ${t('platform_connect')}</h3>
      <div class="platform-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
        ${platforms.map(p => `
          <div class="platform-card" style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;${p.connected?'':'opacity:0.6;'}">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
              <div style="width:40px;height:40px;border-radius:8px;background:${p.color}22;display:flex;align-items:center;justify-content:center;font-size:20px;color:${p.color};"><i class="${p.icon}"></i></div>
              <div>
                <div style="font-weight:600;font-size:14px;">${p.name}</div>
                <div style="font-size:11px;color:var(--text-secondary);">${t('last_sync')}: ${p.lastSync}</div>
              </div>
              <span class="badge badge-${p.status==='synced'?'success':p.status==='pending'?'warning':'danger'}" style="margin-left:auto;">${t('status_'+p.status)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;">
              <span style="color:var(--text-secondary);">${t('products_crawled')}: <strong>${p.syncedProducts}</strong></span>
              ${p.connected 
                ? `<button class="btn" style="font-size:11px;padding:4px 10px;" onclick="syncPlatform('${p.id}')"><i class="fas fa-sync-alt"></i> Sync</button>`
                : `<button class="btn btn-accent" style="font-size:11px;padding:4px 10px;" onclick="connectPlatform('${p.id}')"><i class="fas fa-link"></i> ${t('action_connect')}</button>`
              }
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div style="margin-top:20px;">
      <h3 style="margin:0 0 12px 0;font-size:16px;">🚀 ${t('auto_listing')}</h3>

        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <button class="btn btn-accent" onclick="autoListAll()"><i class="fas fa-rocket"></i> ${t('action_publish')} → All Platforms</button>
          <button class="btn btn-success" onclick="autoGenerateDetails()"><i class="fas fa-magic"></i> ${t('action_generate')} (AI)</button>
          <button class="btn" onclick="crawlAllPlatforms()"><i class="fas fa-spider"></i> ${t('action_crawl')} → All</button>
        </div>
        <div id="autoListingLog" style="margin-top:12px;font-size:12px;color:var(--text-secondary);max-height:120px;overflow-y:auto;background:rgba(0,0,0,0.1);border-radius:8px;padding:10px;">
          <div style="opacity:0.6;">[系统] ${Store.lang==='zh'?'等待操作...':'Awaiting commands...'}</div>
        </div>
      </div>
    </div>
  `;
}

function syncPlatform(pid) {
  const p = Store.b2cPlatforms.find(x => x.id === pid);
  if (!p) return;
  const log = document.getElementById('autoListingLog');
  if (log) log.innerHTML = `<div style="color:var(--info);">[${new Date().toLocaleTimeString()}] ${Store.lang==='zh'?'正在同步':'Syncing'} ${p.name}...</div>` + log.innerHTML;
  setTimeout(() => {
    p.status = 'synced';
    p.lastSync = new Date().toLocaleString('sv').replace('T',' ');
    if (log) log.innerHTML = `<div style="color:var(--success);">[${new Date().toLocaleTimeString()}] ✅ ${p.name} ${Store.lang==='zh'?'同步完成':'synced'} (${p.syncedProducts} ${Store.lang==='zh'?'个商品':'products'})</div>` + log.innerHTML;
    toast('✅ ' + p.name + ' ' + (Store.lang==='zh'?'同步成功':'synced'));
  }, 1500);
}

function connectPlatform(pid) {
  const p = Store.b2cPlatforms.find(x => x.id === pid);
  if (!p) return;
  p.connected = true;
  p.status = 'synced';
  p.syncedProducts = Math.floor(Math.random() * 50) + 10;
  p.lastSync = new Date().toLocaleString('sv').replace('T',' ');
  toast('✅ ' + p.name + ' ' + (Store.lang==='zh'?'已连接':'connected'));
  showPage('b2c_erp');
}

function autoListAll() {
  const log = document.getElementById('autoListingLog');
  const platforms = Store.b2cPlatforms.filter(p => p.connected);
  let i = 0;
  function step() {
    if (i >= platforms.length) {
      if (log) log.innerHTML = `<div style="color:var(--success);font-weight:600;">[${new Date().toLocaleTimeString()}] 🎉 ${Store.lang==='zh'?'所有平台自动上架完成！':'Auto-listing complete on all platforms!'}</div>` + log.innerHTML;
      toast('🎉 ' + (Store.lang==='zh'?'自动上架完成':'Auto-listing complete'));
      return;
    }
    const p = platforms[i];

function doScanInbound() {
  const barcode = document.getElementById('inboundBarcode').value.trim();
  const qty = parseInt(document.getElementById('inboundQty').value) || 0;
  const warehouse = document.getElementById('inboundWarehouse').value;
  if (!barcode || qty <= 0) { toast('⚠️ ' + (Store.lang==='zh'?'请输入条形码和数量':'Enter barcode and qty')); return; }

  let item = Store.wmsStock.find(s => s.barcode === barcode || s.sku === barcode);
  if (item) {
    item.qty += qty;
    item.inboundToday = (item.inboundToday || 0) + qty;
  } else {
    item = { sku:barcode, barcode:barcode, name:'New Product ('+barcode+')', warehouse:warehouse, qty:qty, inboundToday:qty, outboundToday:0, platform:'manual' };
    Store.wmsStock.push(item);
  }

  const logId = 'IN-' + String(Store.wmsLogs.length + 1).padStart(3,'0');
  Store.wmsLogs.unshift({ id:logId, type:'inbound', sku:item.sku, name:item.name, qty:qty, warehouse:warehouse, operator:Store.user?.name||'System', time:new Date().toLocaleString('sv').replace('T',' '), method:'manual' });

  const wh = Store.warehouses.find(w => w.id === warehouse);
  if (wh) wh.used += qty;

  toast('✅ ' + (Store.lang==='zh'?'入库成功':'Inbound OK') + ': ' + item.name + ' +' + qty);
  document.getElementById('inboundBarcode').value = '';
  document.getElementById('inboundQty').value = '1';
  showPage('b2c_wms');
}

function doScanOutbound() {
  const barcode = document.getElementById('outboundBarcode').value.trim();
  const qty = parseInt(document.getElementById('outboundQty').value) || 0;
  const warehouse = document.getElementById('outboundWarehouse').value;
  if (!barcode || qty <= 0) { toast('⚠️ ' + (Store.lang==='zh'?'请输入条形码和数量':'Enter barcode and qty')); return; }

  let item = Store.wmsStock.find(s => s.barcode === barcode || s.sku === barcode);
  if (!item) { toast('❌ ' + (Store.lang==='zh'?'未找到该商品':'Product not found')); return; }
  if (item.qty < qty) { toast('⚠️ ' + (Store.lang==='zh'?'库存不足':'Insufficient stock') + ` (${item.qty})`); return; }

  item.qty -= qty;
  item.outboundToday = (item.outboundToday || 0) + qty;

  const logId = 'OUT-' + String(Store.wmsLogs.filter(l=>l.type==='outbound').length + 1).padStart(3,'0');
  Store.wmsLogs.unshift({ id:logId, type:'outbound', sku:item.sku, name:item.name, qty:qty, warehouse:warehouse, operator:Store.user?.name||'System', time:new Date().toLocaleString('sv').replace('T',' '), method:'manual' });

  const wh = Store.warehouses.find(w => w.id === warehouse);
  if (wh) wh.used = Math.max(0, wh.used - qty);

  toast('✅ ' + (Store.lang==='zh'?'出库成功':'Outbound OK') + ': ' + item.name + ' -' + qty);
  document.getElementById('outboundBarcode').value = '';
  document.getElementById('outboundQty').value = '1';
  showPage('b2c_wms');
}

function openCameraScan(mode) {
  // Use browser native barcode detection if available, otherwise prompt
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    toast('📷 ' + (Store.lang==='zh'?'请在浏览器弹窗中允许摄像头权限':'Allow camera access in browser popup'));
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(stream => {
      const video = document.createElement('video');
      video.srcObject = stream;
      video.autoplay = true;
      video.style.cssText = 'position:fixed;inset:0;z-index:10000;width:100%;height:100%;object-fit:cover;';
      const closeBtn = document.createElement('button');
      closeBtn.textContent = '✕ ' + (Store.lang==='zh'?'关闭':'Close');
      closeBtn.style.cssText = 'position:fixed;top:20px;right:20px;z-index:10001;background:#ef4444;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:16px;cursor:pointer;';
      closeBtn.onclick = () => { stream.getTracks().forEach(t=>t.stop()); video.remove(); closeBtn.remove(); infoDiv.remove(); };
      const infoDiv = document.createElement('div');
      infoDiv.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10001;background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;';
      infoDiv.innerHTML = Store.lang==='zh' ? '📷 摄像头已打开<br>扫描条形码后手动输入<br>（浏览器内置扫码需 HTTPS）' : '📷 Camera active<br>Scan barcode and enter manually<br>(HTTPS required for native scan)';
      document.body.appendChild(video);
      document.body.appendChild(closeBtn);
      document.body.appendChild(infoDiv);
      // Auto-close after 15 seconds
      setTimeout(() => { if(video.parentNode){ stream.getTracks().forEach(t=>t.stop()); video.remove(); closeBtn.remove(); infoDiv.remove(); } }, 15000);
    }).catch(err => {
      toast('❌ ' + (Store.lang==='zh'?'无法访问摄像头':'Camera access denied') + ': ' + err.message);
    });
  } else {
    toast('❌ ' + (Store.lang==='zh'?'浏览器不支持摄像头扫码':'Camera not supported'));
  }
}

  const platformSel = document.getElementById('crawlPlatformSelect').value;
  const platformName = platformSel === 'auto' ? 'Auto' : (Store.b2cPlatforms.find(p=>p.id===platformSel)||{}).name || 'Auto';
  const id = 'CR' + String(Store.crawledProducts.length + 1).padStart(3,'0');
  const sampleProducts = ['K-Beauty Essence','Vital Mask Pack','Premium Toner','Cleansing Foam','BB Cushion','Hair Serum','Eye Cream','Sunscreen SPF50'];
  const sampleEmojis = ['🧴','😷','💧','🧼','💄','💁','👁️','☀️'];
  const idx = Math.floor(Math.random() * sampleProducts.length);
  const newProduct = {
    id: id,
    sourceUrl: url,
    platform: platformName,
    name: sampleProducts[idx] + ' (Crawled)',
    price: '$' + (Math.random() * 30 + 5).toFixed(2),
    image: sampleEmojis[idx],
    status: 'crawling',
    crawledAt: new Date().toLocaleString('sv').replace('T',' '),
    detailGenerated: false
  };
  Store.crawledProducts.unshift(newProduct);
  toast('🕷️ ' + (Store.lang==='zh'?'开始采集':'Crawling started') + ': ' + url);
  // Simulate crawl completion
  setTimeout(() => {
    newProduct.status = 'crawled';
    toast('✅ ' + (Store.lang==='zh'?'采集完成':'Crawl complete') + ': ' + newProduct.name);
    showPage('b2c_crawler');
  }, 2500);
  showPage('b2c_crawler');
}

function generateDetail(productId) {
  const p = Store.crawledProducts.find(x => x.id === productId);
  if (!p) return;
  toast('🤖 AI ' + (Store.lang==='zh'?'正在生成详情页':'generating detail') + ': ' + p.name);
  setTimeout(() => {
    p.detailGenerated = true;
    toast('✅ ' + (Store.lang==='zh'?'AI详情页已生成':'AI detail generated') + ': ' + p.name);
    showPage('b2c_crawler');
  }, 1500);
}

function publishProduct(productId) {
  const p = Store.crawledProducts.find(x => x.id === productId);
  if (!p) return;
  if (!p.detailGenerated) {
    toast('⚠️ ' + (Store.lang==='zh'?'请先生成详情页':'Generate detail first'));
    return;
  }
  toast('🚀 ' + (Store.lang==='zh'?'正在发布':'Publishing') + ': ' + p.name);
  setTimeout(() => {
    toast('✅ ' + (Store.lang==='zh'?'已发布到所有对接平台':'Published to all platforms') + ': ' + p.name);
  }, 1500);
}

// ===== UNDO / REDO =====
function undoAction(pageId) {
  if (!undoHistory[pageId] || undoHistory[pageId].length === 0) {
    toast(`⚠️ ${Store.lang==='zh'?'没有可撤销的操作':'Nothing to undo'}`);
    return;
  }
  const prev = undoHistory[pageId].pop();
  if (!redoHistory[pageId]) redoHistory[pageId] = [];
  redoHistory[pageId].push(prev);
  showPage(pageId);
  toast(`↩️ ${Store.lang==='zh'?'已撤销':'Undone'}`);
}

function redoAction(pageId) {
  if (!redoHistory[pageId] || redoHistory[pageId].length === 0) {
    toast(`⚠️ ${Store.lang==='zh'?'没有可恢复的操作':'Nothing to redo'}`);
    return;
  }
  const next = redoHistory[pageId].pop();
  if (!undoHistory[pageId]) undoHistory[pageId] = [];
  undoHistory[pageId].push(next);
  showPage(pageId);
  toast(`↪️ ${Store.lang==='zh'?'已恢复':'Redone'}`);
}

// ===== EXCEL IMPORT/EXPORT =====
function importExcel(pageId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls,.csv';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = new Uint8Array(ev.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);
        toast(`✅ ${Store.lang==='zh'?'成功导入':'Imported'} ${json.length} ${Store.lang==='zh'?'条记录':'records'} → ${t(pageId)}`);
        // Save to undo history
        if (!undoHistory[pageId]) undoHistory[pageId] = [];
        undoHistory[pageId].push({ action: 'import', data: json });
      } catch(err) {
        toast(`❌ ${Store.lang==='zh'?'导入失败':'Import failed'}: ${err.message}`);
      }
    };
    reader.readAsArrayBuffer(file);
  };
  input.click();
}

let smsTimer = null;
function sendSmsCode() {

  const phone = document.getElementById('regPhone').value.trim();
  if (!phone) { toast('请输入手机号码 / Please enter phone number', 'error'); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { toast('请输入有效的中国手机号码 / Please enter a valid China phone number', 'error'); return; }
  
  const btn = document.getElementById('btnSendSms');
  let sec = 60;
  btn.disabled = true;
  btn.classList.add('counting');
  btn.textContent = sec + 's 后重发';
  
  // Simulated SMS code (demo: 888888)
  Store._smsCode = '888888';
  toast('验证码已发送 (Demo: 888888) / SMS code sent');
  
  smsTimer = setInterval(() => {
    sec--;
    if (sec <= 0) {
      clearInterval(smsTimer);
      btn.disabled = false;
      btn.classList.remove('counting');
      btn.textContent = '获取验证码';
    } else {
      btn.textContent = sec + 's 后重发';
    }
  }, 1000);
}

function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const smsCode = document.getElementById('regSmsCode').value.trim();
  const pass = document.getElementById('regPass').value;
  const passConfirm = document.getElementById('regPassConfirm').value;
  const agreed = document.getElementById('regAgreeTerms').checked;
  
  if (!name) { toast('请输入姓名 / Please enter your name', 'error'); return; }
  if (!phone) { toast('请输入手机号码', 'error'); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { toast('请输入有效的中国手机号码 (11位)', 'error'); return; }
  if (!smsCode) { toast('请输入验证码', 'error'); return; }
  if (smsCode !== Store._smsCode && smsCode !== '888888') { toast('验证码错误 / Invalid SMS code', 'error'); return; }
  if (!pass || pass.length < 6) { toast('密码至少6位 / Password must be at least 6 characters', 'error'); return; }
  if (pass !== passConfirm) { toast('两次密码不一致 / Passwords do not match', 'error'); return; }
  if (!agreed) { toast('请同意服务条款 / Please agree to Terms', 'error'); return; }
  
  // Check if phone already registered
  if (Store.accounts.find(a => a.phone === phone)) {
    toast('该手机号已注册 / Phone already registered', 'error'); return;
  }
  
  // Create account — default minimal permissions
  const newAccount = {
    id: 'U' + String(Store.accounts.length + 1).padStart(3, '0'),
    name: name,
    phone: phone,
    password: pass,
    role: 'staff',
    permissions: {

}

function requestPermission(moduleId) {
  if (!Store.user || !Store.user.accountId) {
    toast('请先登录 / Please login first', 'error'); return;
  }
  
  // Check if already requested
  const existing = Store.permissionRequests.find(
    r => r.accountId === Store.user.accountId && r.moduleId === moduleId && r.status === 'pending'
  );
  if (existing) {
    toast(Store.lang==='zh'?'已提交过该权限申请，请等待审批':'Already submitted, pending approval', 'info');
    return;
  }
  
  // Check if already has permission
  if (Store.user.permissions && Store.user.permissions[moduleId]) {
    toast(Store.lang==='zh'?'您已有该权限':'You already have this permission', 'info');
    return;
  }
  
  Store.permissionRequests.push({
    id: 'PR' + String(Store.permissionRequests.length + 1).padStart(3, '0'),
    accountId: Store.user.accountId,
    accountName: Store.user.name || Store.user.username,
    moduleId: moduleId,
    moduleName: t(moduleId) || moduleId,
    status: 'pending',
    requestedAt: new Date().toISOString(),
    reviewedBy: null,
    reviewedAt: null,
  });
  
  toast(Store.lang==='zh'?'权限申请已提交，等待上级审批':'Permission request submitted, pending approval', 'success');
}

function approvePermission(requestId) {
  const req = Store.permissionRequests.find(r => r.id === requestId);
  if (!req) return;
  
  req.status = 'approved';
  req.reviewedBy = Store.user.username;
  req.reviewedAt = new Date().toISOString();
  
  // Update the target user's permissions
  const account = Store.accounts.find(a => a.id === req.accountId);
  if (account) {
    account.permissions[req.moduleId] = true;
  }
  
  // If the target user is currently logged in, update their session
  if (Store.user.accountId === req.accountId) {
    Store.user.permissions[req.moduleId] = true;
  }
  
  toast(`✅ ${Store.lang==='zh'?'已批准':'Approved'}: ${req.accountName} → ${req.moduleName}`, 'success');
  if (Store.currentPage === 'permissions') showPage('permissions');
}

function rejectPermission(requestId) {
  const req = Store.permissionRequests.find(r => r.id === requestId);
  if (!req) return;
  
  req.status = 'rejected';
  req.reviewedBy = Store.user.username;
  req.reviewedAt = new Date().toISOString();
  
  toast(`❌ ${Store.lang==='zh'?'已拒绝':'Rejected'}: ${req.accountName} → ${req.moduleName}`, 'info');
  if (Store.currentPage === 'permissions') showPage('permissions');
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!user || !pass) { toast('Please enter username and password'); return; }
  
  // Check registered accounts first (phone login)
  const registered = Store.accounts.find(a => a.phone === user && a.password === pass);
  if (registered) {
    Store.user = {
      username: user,
      role: registered.role,
      permissions: registered.permissions,
      accountId: registered.id,
      name: registered.name,
    };
    document.getElementById('currentUserName').textContent = registered.name || user;
    hideLogin();
    buildSidebar();
    showPage('dashboard');
    saveToStorage(); // Save immediately
    toast(`👋 ${Store.lang==='zh'?'欢迎回来':'Welcome back'}, ${registered.name}!`);
    return;
  }
  
  // Demo credentials (backward compatible)
  if (pass !== 'admin123') { toast('Invalid credentials / 用户名或密码错误 / 잘못된 자격 증명', 'error'); return; }
  
  Store.user = { username: user, role: document.getElementById('loginRole').value };
  document.getElementById('currentUserName').textContent = user;
  
  hideLogin();
  
  buildSidebar();
  showPage('dashboard');
  saveToStorage(); // Save immediately
  toast(`👋 Welcome, ${user}!`);
}

// Remove login from DOM & show app
function hideLogin() {
  var lc = document.getElementById('loginContainer');
  if (lc && lc.parentNode) lc.parentNode.removeChild(lc);
  var ac = document.getElementById('appContainer');

function editUserPermissions(accountId) {

  const account = Store.accounts.find(a => a.id === accountId);

// ===== BACKUP & RESTORE PAGE =====
function renderBackup() {
  const lastSave = localStorage.getItem('globalep_lastSave');
  const lastSaveStr = lastSave ? new Date(lastSave).toLocaleString() : 'Never';
  
  // Calculate approximate storage usage
  let storageUsed = 0;
  try {
    const stored = localStorage.getItem('globalep_store');
    if (stored) storageUsed = new Blob([stored]).size;
  } catch(e) {}
  const storagePercent = Math.min(Math.round((storageUsed / (5 * 1024 * 1024)) * 100), 100); // 5MB localStorage limit
  
  const autoSaveOn = localStorage.getItem('globalep_autoSave') !== 'off';
  
  return `<div class="page">
    <div class="page-header">${t('backup_restore')}</div>
    <p style="color:var(--text-secondary);margin-bottom:24px;font-size:13px;">${t('backup_desc')}</p>
    
    <div class="backup-grid">
      <div class="card" style="text-align:center;cursor:pointer;" onclick="exportBackup()">
        <i class="fas fa-download" style="font-size:32px;color:var(--accent);margin-bottom:12px;display:block;"></i>
        <strong>${t('export_backup')}</strong>
        <p class="stat-label">${t('click_to_export')}</p>
      </div>
      <div class="card" style="text-align:center;cursor:pointer;" onclick="triggerImportBackup()">
        <i class="fas fa-upload" style="font-size:32px;color:var(--success);margin-bottom:12px;display:block;"></i>
        <strong>${t('import_backup')}</strong>
        <p class="stat-label">${t('click_to_import')}</p>
      </div>
      <div class="card" style="text-align:center;">
        <i class="fas fa-clock" style="font-size:32px;color:var(--warning);margin-bottom:12px;display:block;"></i>
        <strong>${t('backup_time')}</strong>
        <p class="stat-label">${lastSaveStr}</p>
      </div>
      <div class="card" style="text-align:center;">
        <i class="fas fa-hdd" style="font-size:32px;color:var(--text-secondary);margin-bottom:12px;display:block;"></i>
        <strong>${t('storage_usage')}</strong>
        <div class="storage-bar"><div class="storage-bar-fill" style="width:${storagePercent}%;"></div></div>
        <p class="stat-label">${(storageUsed / 1024).toFixed(1)} KB / 5 MB</p>
      </div>
    </div>
    
    <div class="auto-save-toggle">
      <div class="switch ${autoSaveOn ? 'active' : ''}" id="autoSaveSwitch" onclick="toggleAutoSave()"></div>
      <label>${autoSaveOn ? t('auto_save_on') : t('auto_save_off')}
        <span style="display:block;font-size:11px;color:var(--text-muted);">${Store.lang==='zh'?'每30秒自动保存到浏览器本地存储':'Auto-save every 30 seconds to browser local storage'}</span>
      </label>
    </div>
    
    <div style="margin-top:24px;padding:16px;background:rgba(59,130,246,0.05);border:1px solid var(--border);border-radius:var(--radius);">
      <h4 style="font-size:13px;color:var(--accent-light);margin-bottom:8px;">${Store.lang==='zh'?'数据安全说明':'Data Security Notes'}</h4>
      <ul style="font-size:12px;color:var(--text-muted);line-height:2;padding-left:20px;">
        <li>${Store.lang==='zh'?'数据存储在浏览器的 localStorage 中':'Data is stored in your browser localStorage'}</li>
        <li>${Store.lang==='zh'?'清除浏览器缓存会删除所有数据，请定期导出备份':'Clearing browser cache will delete all data. Export backups regularly.'}</li>
        <li>${Store.lang==='zh'?'备份文件为 JSON 格式，可在任何文本编辑器查看':'Backup files are JSON format, viewable in any text editor'}</li>
        <li>${Store.lang==='zh'?'建议每周做一次完整数据备份':'Recommend weekly full data backup'}</li>
        <li>${Store.lang==='zh'?'作为 PWA 安装后，数据更加持久':'Data is more persistent when installed as a PWA'}</li>
      </ul>
    </div>
  </div>`;
}

function toggleAutoSave() {
  const current = localStorage.getItem('globalep_autoSave') !== 'off';
  const newState = !current;
  localStorage.setItem('globalep_autoSave', newState ? 'on' : 'off');
  autoSaveEnabled = newState;
  toast(newState ? '✅ ' + t('auto_save_on') : '⚠️ ' + t('auto_save_off'), newState ? 'success' : 'info');
  showPage('backup');
}

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  overlay.innerHTML = `<div class="modal-box"><h3>${existing?t('edit_perf'):t('add_performance')}</h3>
    ${!existing?`<label>${t('person_name')}</label><select id="perfPerson">${peopleOptions}</select>`:''}
    <label>${t('kpi_score')} (%)</label><input type="number" id="perfKpi" min="0" max="150" value="${existing?existing.kpi:80}">
    <label>${t('grade')}</label><select id="perfGrade"><option value="s" ${existing&&existing.grade==='s'?'selected':''}>S (≥95%)</option><option value="a" ${existing&&existing.grade==='a'?'selected':''}>A (85-94%)</option><option value="b" ${existing&&existing.grade==='b'?'selected':''} ${!existing?'selected':''}>B (70-84%)</option><option value="c" ${existing&&existing.grade==='c'?'selected':''}>C (&lt;70%)</option></select>
    <label>${t('achievement')}</label><textarea id="perfAch" placeholder="${t('achievement')}...">${existing?existing.achievements:''}</textarea>
    <div class="modal-actions"><button class="btn-cancel" onclick="closePerfModal()">${t('cancel')}</button><button class="btn-primary" onclick="savePerformance('${perfId||''}')">${t('save')}</button></div></div>`;
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closePerfModal(); });
  document.body.appendChild(overlay);
}
function closePerfModal() { const m = document.getElementById('perfModal'); if (m) m.remove(); }
function savePerformance(perfId) {
  const kpi = parseInt(document.getElementById('perfKpi').value) || 80;
  const grade = kpi >= 95 ? 's' : kpi >= 85 ? 'a' : kpi >= 70 ? 'b' : 'c';
  const ach = document.getElementById('perfAch').value;
  if (perfId) {
    const existing = performanceData.find(p => p.id === perfId);
    if (existing) { existing.kpi = kpi; existing.grade = grade; existing.achievements = ach; existing.updatedAt = new Date().toISOString(); }
  } else {
    const pv = document.getElementById('perfPerson').value.split('|');
    const id = 'perf_' + pv[0] + '_' + pv[1].replace(/\s/g,'_');
    const existIdx = performanceData.findIndex(p => p.id === id);
    const entry = { id, deptId:pv[0], company:pv[2], name:pv[1], role:pv[3], deptName:pv[4], kpi, grade, achievements:ach, updatedAt:new Date().toISOString() };
    if (existIdx >= 0) performanceData[existIdx] = entry;
    else performanceData.push(entry);
  }
  closePerfModal();
  renderOrgPage();
  saveToStorage();
  toast('Performance saved / 绩效已保存 / 성과 저장됨', 'success');
}

// ---- Tab 5: Recruitment ----
function renderRecruitmentView() {
  const urg = recruitmentData.filter(r => r.status === 'status_urgent');
  const watch = recruitmentData.filter(r => r.status === 'status_watch');
  let html = '';
  if (urg.length > 0) html += `<div class="recruit-alert urgent"><span class="alert-icon">🚨</span><div><b>${urg.length}</b> ${t('departments')} ${t('status_urgent')}：${urg.map(r => r.deptName).join('、')}</div></div>`;
  if (watch.length > 0) html += `<div class="recruit-alert normal"><span class="alert-icon">⚠️</span><div><b>${watch.length}</b> ${t('departments')} ${t('status_watch')}：${watch.map(r => r.deptName).join('、')}</div></div>`;

  html += `<div style="overflow-x:auto;"><table class="recruit-table"><thead><tr><th>#</th><th>${t('department')}</th><th>${t('company')}</th><th>${t('headcount')}</th><th>${t('workload')}</th><th>人效比</th><th>${t('status')||'状态'}</th><th>${t('need_hire')}</th></tr></thead><tbody>`;
  const sorted = [...recruitmentData].sort((a,b) => b.ratio - a.ratio);
  sorted.forEach((r,i) => {
    const pCls = r.status === 'status_urgent' ? 'high' : r.status === 'status_watch' ? 'medium' : 'low';
    const aCls = r.status === 'status_urgent' ? 'need' : r.status === 'status_watch' ? 'watch' : 'ok';
    const st = r.status === 'status_urgent' ? '🔴 '+t('status_urgent') : r.status === 'status_watch' ? '🟡 '+t('status_watch') : '🟢 '+t('status_ok');
    html += `<tr><td><span class="recruit-priority ${pCls}"></span> ${i+1}</td><td><b>${r.deptName}</b></td><td>${r.company==='korea'?'🇰🇷':'🇨🇳'} ${r.companyName}</td><td>${r.headcount}</td><td>${r.workload}</td><td>${r.ratio}x</td><td>${st}</td><td><span class="recruit-action ${aCls}">${r.needHire>0?`+${r.needHire} ${t('person')}`:'-'}</span></td></tr>`;
  });
  html += '</tbody></table></div>';

  html += `<div style="margin-top:20px;padding:16px;background:var(--bg-card);border-radius:10px;border:1px solid var(--border);"><h4 style="margin:0 0 12px 0;font-size:13px;">⚙️ 调整业务负载</h4><p style="font-size:11px;color:var(--text-secondary);margin:0 0 12px 0;">调整各部门的业务负载系数，系统将自动重新计算招人需求。</p><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">`;
  recruitmentData.forEach(r => {
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--bg-hover);border-radius:6px;"><span style="font-size:11px;">${r.company==='korea'?'🇰🇷':'🇨🇳'} ${r.deptName}</span><input type="range" min="0.5" max="5" step="0.5" value="${r.workload}" style="width:80px;" onchange="adjustWorkload('${r.deptId}',parseFloat(this.value))"><span style="font-size:11px;font-weight:600;min-width:25px;">${r.workload}x</span></div>`;
  });
  html += `</div><button onclick="resetWorkload()" style="margin-top:10px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;background:var(--bg-card);color:var(--text);">🔄 恢复默认</button></div>`;
  return html;
}
window.adjustWorkload = function(deptId, val) {
  const r = recruitmentData.find(x => x.deptId === deptId);
  if (r) {
    r.workload = val;
    const ratio = val / r.headcount;
    r.ratio = ratio.toFixed(1);
    if (ratio > 2.5) { r.status = 'status_urgent'; r.needHire = Math.ceil((val - r.headcount * 2) / 2); }
    else if (ratio > 1.5) { r.status = 'status_watch'; r.needHire = ratio > 2 ? 1 : 0; }
    else { r.status = 'status_ok'; r.needHire = 0; }
    renderOrgPage();
    saveToStorage();
  }
};
window.resetWorkload = function() {
  computeRecruitment(defaultWorkload);
  renderOrgPage();
  saveToStorage();
  toast('Workload reset / 负载已重置', 'success');
};

// ===== LOGOUT =====
function doLogout() {
  Store.user = null;
  localStorage.removeItem('globalep_user');
  localStorage.removeItem('globalep_store');
  // Hide app
  var ac = document.getElementById('appContainer');
  if (ac) ac.style.display = 'none';
  document.getElementById('userDropdown').classList.remove('active');
  // Re-inject login if not already present
  if (!document.getElementById('loginContainer')) {
    var tpl = document.getElementById('loginTemplate');
    if (tpl) {
      var clone = tpl.content.cloneNode(true);
      document.body.insertBefore(clone, ac);
    }
  }
  // Force show injected login
  var lc = document.getElementById('loginContainer');
  if (lc) lc.style.display = 'flex';
  // Initialize login background animation
  if (typeof initLoginBg === 'function') setTimeout(initLoginBg, 0);
  // Clear form fields
  var lu = document.getElementById('loginUser'); if (lu) lu.value = '';
  var lp = document.getElementById('loginPass'); if (lp) lp.value = '';
}
